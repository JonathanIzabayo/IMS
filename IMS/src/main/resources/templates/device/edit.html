<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Device</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:500px;
            background:white;
            margin:50px auto;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#004e92;
            margin-bottom:25px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:14px;
            background:#004e92;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Edit Device</h2>

<form method="post"
      th:action="@{/device/update}"
      th:object="${device}">

    <input type="hidden"
           th:field="*{id}" />

    <input type="text"
           th:field="*{deviceName}" />

    <input type="text"
           th:field="*{serialNumber}" />

    <input type="text"
           th:field="*{type}" />

    <input type="text"
           th:field="*{status}" />

    <input type="text"
           th:field="*{conditionStatus}" />

    <select name="departmentId">

        <option th:each="d : ${departments}"
                th:value="${d.id}"
                th:text="${d.name}"
                th:selected="${device.department != null and d.id == device.department.id}">
        </option>

    </select>

    <button type="submit">
        Update Device
    </button>

</form>

</div>

</body>
</html>
