<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Device</title>

    <style>

        body{
            font-family:Arial;
            background:#f4f6f9;
        }

        .container{
            width:500px;
            background:white;
            margin:50px auto;
            padding:35px;
            border-radius:12px;
            box-shadow:0 5px 20px rgba(0,0,0,0.1);
        }

        h2{
            text-align:center;
            color:#004e92;
            margin-bottom:25px;
        }

        input,select{
            width:100%;
            padding:12px;
            margin-top:10px;
            margin-bottom:18px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:14px;
            background:#004e92;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#002f5e;
        }

    </style>

</head>

<body>

<div class="container">

<h2>Add Device</h2>

<form method="post"
      th:action="@{/device/save}"
      th:object="${device}">

    <input type="text"
           th:field="*{deviceName}"
           placeholder="Device Name"/>

    <input type="text"
           th:field="*{serialNumber}"
           placeholder="Serial Number"/>

    <input type="text"
           th:field="*{type}"
           placeholder="Type"/>

    <input type="text"
           th:field="*{status}"
           placeholder="Status"/>

    <input type="text"
           th:field="*{conditionStatus}"
           placeholder="Condition"/>

    <select name="departmentId">

        <option value="">
            -- Select Department --
        </option>

        <option th:each="d : ${departments}"
                th:value="${d.id}"
                th:text="${d.name}">
        </option>

    </select>

    <button type="submit">
        Save Device
    </button>

</form>

</div>

</body>
</html>
